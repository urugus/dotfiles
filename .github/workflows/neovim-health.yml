name: neovim-health

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Neovim ${{ matrix.channel }}
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, nightly]
    env:
      CI: true
    steps:
      # Supply-chain hardening: pin actions to full commit SHA
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: ${{ matrix.channel }}

      - name: Cache lazy.nvim directories
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ github.workspace }}/.local/share/nvim
            ${{ github.workspace }}/.local/state/nvim
            ${{ github.workspace }}/.cache/nvim
          key: ${{ runner.os }}-nvim-${{ matrix.channel }}-${{ hashFiles('.config/nvim/lazy-lock.json', 'scripts/check-neovim.sh') }}
          restore-keys: |
            ${{ runner.os }}-nvim-${{ matrix.channel }}-
            ${{ runner.os }}-nvim-

      - name: Run Neovim deprecated check
        run: scripts/check-neovim.sh
