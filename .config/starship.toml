format = """
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$rust\
$ruby\
$golang\
$php\
$time\
$os\
\n$character"""

add_newline = true
command_timeout = 1000
continuation_prompt = "[.](bright-black) "

# left_promptとright_promptの間を何で埋めるか設定
[fill]
symbol = ' '

[os]
format = "[$symbol]($style)"
style = "fg:#2E3440 bg:#88C0D0 bold"
disabled = false

[os.symbols]
Macos = " mac "
Ubuntu = " ubuntu "
Debian = " debian "
Linux = " linux "
Windows = " windows "
Unknown = " unknown "

[directory]
style = "fg:#2E3440 bg:#88C0D0 bold"
format = "[ $path ]($style)"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = ".../"
read_only = " ro"

[directory.substitutions]
"Documents" = "Documents"
"Downloads" = "Downloads"
"Music" = "Music"
"Pictures" = "Pictures"

[gcloud]
disabled = true

[git_branch]
symbol = "git"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'
truncation_symbol = "..."

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
ahead = 'ahead:${count}'
behind = 'behind:${count}'
diverged = 'ahead:${ahead_count} behind:${behind_count}'
up_to_date = ''
conflicted = 'conflict:${count} '
stashed = 'stash:${count} '
modified = 'mod:${count} '
staged = 'staged:${count} '
renamed = 'renamed:${count} '
deleted = 'del:${count} '
# libgit2 (used by starship) reports phantom untracked entries due to differences
# in .gitignore handling vs git CLI; suppress the noisy `?` symbol.
untracked = ''

[nodejs]
symbol = "node"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#68A063 bg:#212736)]($style)'

[rust]
symbol = "rust"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#B7410E bg:#212736)]($style)'

[ruby]
symbol = "ruby"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#cc0000 bg:#212736)]($style)'

[golang]
symbol = "go"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "php"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#8892BF bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ time $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[character]
success_symbol = "[>](bold green)"
error_symbol = "[x](bold red)"
vimcmd_symbol = "[<](bold green)"
vimcmd_visual_symbol = "[v](bold yellow)"
vimcmd_replace_symbol = "[r](bold purple)"
vimcmd_replace_one_symbol = "[r](bold purple)"
